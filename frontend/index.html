<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truyện Có Não — Audio Stories Platform</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">🎧</div>
        <div class="brand-text">
          <div class="name">Truyện Có Não</div>
          <div class="sub">Audio Stories</div>
        </div>
      </div>

      <div id="auth-box" class="auth-box"></div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Tìm truyện..."
          oninput="handleSearchInput()"
          autocomplete="off"
        >
      </div>

      <div>
        <div class="nav-label" style="margin-bottom:10px">Khám phá truyện audio</div>
        <div id="story-list" class="story-list">
          <p class="loading-text">Đang tải...</p>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">

      <!-- Player hero -->
      <div id="player-hero" class="player-hero">
        <p class="loading-text">Đang tải trình phát...</p>
      </div>

      <!-- Episode list -->
      <div class="section-heading" id="episodes-heading" style="display:none">Danh sách tập</div>
      <div id="episode-list" class="episode-list"></div>

      <!-- Unlock CTA (rendered dynamically right after the first locked episode) -->
      <div id="unlock-cta-slot"></div>

    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

  <div id="auth-modal" class="auth-modal-overlay" style="display:none" onclick="closeAuthModalOnOverlay(event)">
  <div class="auth-modal">
    <button class="auth-modal-close" onclick="closeAuthModal()">✕</button>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Đăng nhập</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Đăng ký</button>
    </div>

    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <input type="text" id="login-username" placeholder="Tên đăng nhập" required autocomplete="username">
      <input type="password" id="login-password" placeholder="Mật khẩu" required autocomplete="current-password">
      <button type="submit" class="auth-submit-btn">Đăng nhập</button>
      <div class="auth-error" id="login-error"></div>
    </form>

    <form id="register-form" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
      <input type="text" id="register-username" placeholder="Tên đăng nhập (ít nhất 3 ký tự)" required autocomplete="username">
      <input type="text" id="register-displayname" placeholder="Tên hiển thị" required maxlength="30" autocomplete="off">
      <input type="password" id="register-password" placeholder="Mật khẩu (ít nhất 6 ký tự)" required autocomplete="new-password">
      <input type="password" id="register-password-confirm" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
      <button type="submit" class="auth-submit-btn">Đăng ký</button>
      <div class="auth-error" id="register-error"></div>
    </form>
  </div>
</div>
</body>
</html>
